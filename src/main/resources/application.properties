spring.application.name=IrgendwieAnders

spring.main.banner-mode=off

server.port=80

# Frontend-Ressourcen: zuerst aus dem Vite-Build-Output, dann aus dem Classpath
spring.web.resources.static-locations=file:frontend/dist/,classpath:/static/

# Details zur h2-DB:
spring.datasource.username=spielsuchti
spring.datasource.password=
spring.datasource.url=jdbc:h2:mem:testdb

# H2 Console aktivieren (erreichbar unter /h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# formatierte sql Statements inkl. Binding ausgeben:
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.highlight_sql=true

logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE
logging.level.demo.jpademo.service.TransaktionsdemoService=ERROR

# Beispiel f?r festen Web-Login (Spring Security):
# spring.security.user.name=admin
# spring.security.user.password=geheim

# Bei Bedarf automatisch Transaktion ?ffnen
# spring.jpa.properties.hibernate.enable_lazy_load_no_trans=true